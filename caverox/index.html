<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Caverox — Cyberpunch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* HEADER */
    header { background: #111118; border-bottom: 1px solid #1a1a2e; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo { font-size: 20px; font-weight: 700; color: #a855f7; letter-spacing: 1px; }
    .subtitle { font-size: 12px; color: #555; }
    .status-dot { margin-left: auto; font-size: 12px; color: #22c55e; }

    /* LAYOUT */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* TREE SIDEBAR */
    .sidebar { width: 260px; background: #0d0d14; border-right: 1px solid #1a1a2e; overflow-y: auto; padding: 10px 0; flex-shrink: 0; }

    .tree-node { user-select: none; }
    .tree-row {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s;
      font-size: 13px; color: #888;
    }
    .tree-row:hover { background: #13131f; color: #ccc; }
    .tree-row.selected { background: #1a1030; color: #c084fc; border-left-color: #a855f7; }
    .tree-toggle { font-size: 9px; width: 12px; flex-shrink: 0; color: #444; transition: transform 0.15s; }
    .tree-toggle.open { transform: rotate(90deg); }
    .tree-toggle.leaf { visibility: hidden; }
    .tree-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .tree-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; flex-shrink: 0; }
    .badge-ok { background: #1a2a1a; color: #22c55e; }
    .badge-wip { background: #2a2210; color: #f59e0b; }
    .badge-pending { background: #1a1a1a; color: #444; }

    .tree-children { overflow: hidden; }
    .tree-children.collapsed { display: none; }

    /* DETAIL PANEL */
    .detail { flex: 1; overflow-y: auto; padding: 28px; background: #0a0a0f; }

    .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #333; gap: 10px; }
    .detail-empty .big-icon { font-size: 48px; opacity: 0.3; }
    .detail-empty p { font-size: 14px; }

    .detail-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #1a1a2e; }
    .detail-header .d-icon { font-size: 32px; margin-bottom: 8px; }
    .detail-header h1 { font-size: 20px; font-weight: 700; color: #fff; }
    .detail-header .d-path { font-size: 11px; color: #444; margin-top: 4px; font-family: monospace; }
    .detail-header .d-desc { font-size: 13px; color: #777; margin-top: 8px; line-height: 1.5; }

    .detail-section { margin-bottom: 24px; }
    .detail-section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 12px; }

    /* STATUS BADGES */
    .status-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .status-pill { font-size: 12px; padding: 4px 12px; border-radius: 999px; }
    .pill-ok { background: #1a2a1a; color: #22c55e; border: 1px solid #1e3a1e; }
    .pill-wip { background: #2a2210; color: #f59e0b; border: 1px solid #3a3010; }
    .pill-pending { background: #1a1a1a; color: #555; border: 1px solid #222; }
    .pill-out { background: #2a1a1a; color: #f87171; border: 1px solid #3a1a1a; }

    /* MCP TAGS */
    .mcp-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .mcp-tag { font-size: 11px; padding: 3px 10px; border-radius: 6px; background: #13131f; border: 1px solid #1a1a2e; color: #888; font-family: monospace; }

    /* PARAMS AREA */
    .params-box { background: #111118; border: 1px solid #1a1a2e; border-radius: 10px; padding: 16px; }
    .params-empty { font-size: 13px; color: #444; font-style: italic; }
    .param-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a2e; }
    .param-row:last-child { border-bottom: none; }
    .param-label { font-size: 12px; color: #666; width: 140px; flex-shrink: 0; }
    .param-value { font-size: 12px; color: #aaa; font-family: monospace; flex: 1; }
    .param-edit { font-size: 11px; color: #a855f7; cursor: pointer; opacity: 0.6; }
    .param-edit:hover { opacity: 1; }

    /* ACTION BUTTONS */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: #a855f7; color: #fff; }
    .btn-primary:hover { background: #9333ea; }
    .btn-secondary { background: #1a1a2e; color: #aaa; border: 1px solid #222; }
    .btn-secondary:hover { background: #222; color: #ddd; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* LOG */
    .log-box { background: #0d0d14; border: 1px solid #1a1a2e; border-radius: 8px; padding: 12px 14px; font-family: monospace; font-size: 12px; color: #555; min-height: 48px; margin-top: 12px; }

    /* NOW PLAYING */
    .now-playing { background: #0d0d14; border: 1px solid #1a1a2e; border-radius: 10px; padding: 16px; margin-top: 12px; }
    .np-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .np-track { font-size: 15px; color: #fff; font-weight: 600; }
    .np-artist { font-size: 12px; color: #666; margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🏰 CAVEROX</div>
  <div class="subtitle">Cyberpunch — Exército de Robôs</div>
  <div class="status-dot">● Sistema ativo</div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="detail" id="detail">
    <div class="detail-empty">
      <div class="big-icon">🏰</div>
      <p>Selecione um robô na árvore</p>
    </div>
  </main>
</div>

<script src="renderer.js"></script>
</body>
</html>
